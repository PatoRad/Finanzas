<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control de Finanzas Personales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #0f1117;
  --bg2:       #181b24;
  --bg3:       #1e2230;
  --border:    #2a2f3f;
  --text:      #e8eaf0;
  --text2:     #8b90a0;
  --text3:     #555a6b;
  --green:     #2dd87a;
  --green-bg:  #0d2e1a;
  --red:       #f04a5a;
  --red-bg:    #2b1016;
  --amber:     #f5a623;
  --amber-bg:  #2b1f07;
  --blue:      #4a8ef5;
  --blue-bg:   #0d1e3a;
  --yellow:    #f5d623;
  --yellow-bg: #2b270a;
  --purple:    #b57af5;
  --purple-bg: #1e1030;
  --radius:    10px;
  --radius-sm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px}
body{display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.logo{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.logo span{color:var(--green)}
.header-right{display:flex;align-items:center;gap:8px}
.btn-export{background:var(--green);color:#0a1f12;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;padding:7px 14px;border:none;border-radius:var(--radius-sm);cursor:pointer;letter-spacing:.2px;transition:opacity .15s}
.btn-export:hover{opacity:.85}

/* ── LAYOUT ── */
.main{flex:1;display:flex;flex-direction:column;max-width:900px;width:100%;margin:0 auto;padding:20px 20px 40px}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.kpi-val.green{color:var(--green)}
.kpi-val.red{color:var(--red)}
.kpi-val.amber{color:var(--amber)}
.kpi-val.blue{color:var(--blue)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:4px}
.tab{flex:1;padding:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:var(--radius-sm);transition:all .15s;font-family:'DM Sans',sans-serif;text-align:center}
.tab.on{background:var(--bg3);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.section{display:none}.section.on{display:block}

/* ── FORM BOX ── */
.form-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.form-row1{display:flex;gap:8px;padding:12px 12px 8px;align-items:flex-end;flex-wrap:nowrap}
.form-row2{display:flex;gap:8px;padding:0 12px 12px;align-items:flex-end;border-top:1px solid var(--border);padding-top:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.field input,.field select{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--green)}
.field-fecha input{width:108px}
.field-tipo select{width:110px}
.field-frec select{width:110px}
.field-desc{flex:1}
.field-desc input{width:100%}
.field-monto input{width:120px;text-align:right;font-family:'DM Mono',monospace;font-weight:500}

/* Colores dinámicos del select tipo */
.tipo-ingreso{border-color:var(--green)!important;color:var(--green)!important;background:var(--green-bg)!important}
.tipo-sueldo{border-color:var(--green)!important;color:var(--green)!important;background:var(--green-bg)!important}
.tipo-compra{border-color:var(--red)!important;color:var(--red)!important;background:var(--red-bg)!important}
.tipo-transferencia{border-color:var(--yellow)!important;color:var(--yellow)!important;background:var(--yellow-bg)!important}
.tipo-pago{border-color:var(--blue)!important;color:var(--blue)!important;background:var(--blue-bg)!important}
.tipo-suscripcion{border-color:var(--amber)!important;color:var(--amber)!important;background:var(--amber-bg)!important}
.tipo-sueldo{border-color:var(--purple)!important;color:var(--purple)!important;background:var(--purple-bg)!important}
.frec-mensual{border-color:var(--amber)!important;color:var(--amber)!important;background:var(--amber-bg)!important}

.btn-add{padding:7px 16px;background:var(--green);color:#0a1f12;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .15s;align-self:flex-end}
.btn-add:hover{opacity:.85}

/* ── FILTER TABS ── */
.filter-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ftab{padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);border-radius:20px;font-family:'DM Sans',sans-serif;transition:all .15s}
.ftab.on{border-color:var(--green);color:var(--green);background:var(--green-bg)}

/* ── TABLE ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.col-fecha{color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap}
.col-monto{font-family:'DM Mono',monospace;font-weight:600;text-align:right;white-space:nowrap}
.col-actions{white-space:nowrap;text-align:right}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-ingreso{background:var(--green-bg);color:var(--green)}
.b-compra{background:var(--red-bg);color:var(--red)}
.b-transferencia{background:var(--yellow-bg);color:var(--yellow)}
.b-pago{background:var(--blue-bg);color:var(--blue)}
.b-suscripcion{background:var(--amber-bg);color:var(--amber)}
.b-sueldo{background:var(--purple-bg);color:var(--purple)}
.b-frec-mensual{background:var(--amber-bg);color:var(--amber);font-size:10px;padding:2px 6px;border-radius:10px}
.b-frec-unico{background:var(--bg3);color:var(--text3);font-size:10px;padding:2px 6px;border-radius:10px}

/* action buttons */
.btn-edit,.btn-del{border:none;background:none;cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px;transition:background .15s}
.btn-edit{color:var(--blue)}.btn-edit:hover{background:var(--blue-bg)}
.btn-del{color:var(--red)}.btn-del:hover{background:var(--red-bg)}

/* ── RESUMEN ── */
.meta-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.meta-row label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.meta-row input{font-family:'DM Mono',monospace;font-size:13px;padding:6px 10px;width:140px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);outline:none}
.meta-row input:focus{border-color:var(--green)}
.meta-status{font-size:12px;color:var(--text2)}
.prog-wrap{margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:none}
.prog-header{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px}
.prog-bar{height:8px;border-radius:4px;background:var(--bg3);overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}

.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.cat-card-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
.cat-card-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-bottom:4px}
.cat-card-fill{height:100%;border-radius:3px}
.cat-card-val{font-size:12px;font-family:'DM Mono',monospace;color:var(--text)}

.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.chart-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* ── HISTORIAL ── */
.hist-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.hist-form .field label{font-size:10px}
.hist-form .field input{width:90px;font-size:12px}
.btn-hist{padding:7px 14px;background:var(--bg3);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;align-self:flex-end;transition:border-color .15s}
.btn-hist:hover{border-color:var(--green);color:var(--green)}

/* ── MODAL ── */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;width:320px;max-width:95%}
.modal h3{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text)}
.modal .field{margin-bottom:12px}
.modal .field input,.modal .field select{width:100%}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1;padding:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;border:none;transition:opacity .15s}
.btn-save{background:var(--green);color:#0a1f12}
.btn-cancel{background:var(--bg3);color:var(--text);border:1px solid var(--border)!important}
.btn-save:hover,.btn-cancel:hover{opacity:.8}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

@media(max-width:600px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .form-row1,.form-row2{flex-wrap:wrap}
  .cats-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">💰 <span>Finanzas</span> Personales</div>
  <div class="header-right">
    <span id="sync-status" style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px"></span>
    <button class="btn-export" onclick="exportar()">⬇ Descargar Excel</button>
    <button class="btn-export" onclick="limpiarYRecargar()" style="background:var(--blue);color:#fff">🔄 Recargar Sheets</button>
  </div>
</header>

<div class="main">

  <!-- KPIs -->
  <div class="kpis">
    <div class="kpi"><div class="kpi-label">Ingresos</div><div class="kpi-val green" id="ki">$0</div></div>
    <div class="kpi"><div class="kpi-label">Gastos</div><div class="kpi-val red" id="kg">$0</div></div>
    <div class="kpi"><div class="kpi-label">Suscripciones</div><div class="kpi-val amber" id="ks">$0</div></div>
    <div class="kpi"><div class="kpi-label">Saldo neto</div><div class="kpi-val blue" id="kn">$0</div></div>
  </div>

  <!-- Main tabs -->
  <div class="tabs">
    <button class="tab on" onclick="mainTab('registrar',this)">✏️ Registrar</button>
    <button class="tab" onclick="mainTab('resumen',this)">📊 Resumen</button>
    <button class="tab" onclick="mainTab('historial',this)">📅 Historial</button>
  </div>

  <!-- REGISTRAR -->
  <div id="sec-registrar" class="section on">
    <div class="form-box">
      <!-- Fila 1: Fecha · Tipo · Frecuencia -->
      <div class="form-row1">
        <div class="field field-fecha">
          <label id="f-fecha-label">📅 Fecha</label>
          <input type="date" id="f-fecha"/>
          <input type="number" id="f-dia" placeholder="Día (1-31)" min="1" max="31" style="display:none;width:108px;font-family:'DM Mono',monospace;font-weight:500;font-size:12px;padding:6px 9px;border:1px solid var(--amber);border-radius:var(--radius-sm);background:var(--bg3);color:var(--amber);outline:none;"/>
        </div>
        <div class="field field-tipo">
          <label>🏷 Tipo</label>
          <select id="f-tipo" onchange="colorTipo()">
            <option value="sueldo">💚 Sueldo</option>
            <option value="compra">🛒 Compra</option>
            <option value="transferencia">💛 Transf.</option>
            <option value="pago">🔵 Pago</option>
            <option value="suscripcion">🔄 Suscr.</option>
          </select>
        </div>
        <div class="field field-frec">
          <label>🔁 Frecuencia</label>
          <select id="f-frec" onchange="colorFrec()">
            <option value="unico">1️⃣ Único</option>
            <option value="mensual">📆 Mensual</option>
          </select>
        </div>
      </div>
      <!-- Fila 2: Descripción · Monto · Botón -->
      <div class="form-row2">
        <div class="field field-desc">
          <label>📝 Descripción</label>
          <input type="text" id="f-desc" placeholder="Ej: Supermercado Jumbo" autocomplete="off"/>
        </div>
        <div class="field field-monto">
          <label>💲 Monto (CLP)</label>
          <input type="number" id="f-monto" placeholder="0" min="0"/>
        </div>
        <button class="btn-add" onclick="agregar()">+ Agregar</button>
      </div>
    </div>

    <div class="filter-tabs">
      <button class="ftab on" onclick="filtrar('todos',this)">Todos</button>
      <button class="ftab" onclick="filtrar('sueldo',this)">💚 Sueldo</button>
      <button class="ftab" onclick="filtrar('compra',this)">🛒 Compras</button>
      <button class="ftab" onclick="filtrar('transferencia',this)">💛 Transf.</button>
      <button class="ftab" onclick="filtrar('pago',this)">🔵 Pagos</button>
      <button class="ftab" onclick="filtrar('suscripcion',this)">🔄 Suscr.</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Descripción</th>
            <th>Categoría</th>
            <th style="text-align:right">Monto</th>
            <th>Tipo</th>
            <th>Frec.</th>
            <th style="text-align:right">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- RESUMEN -->
  <div id="sec-resumen" class="section">
    <div class="meta-row">
      <label>Meta de ahorro:</label>
      <input type="number" id="meta-inp" placeholder="ej: 100000" oninput="renderResumen()"/>
      <span class="meta-status" id="meta-status"></span>
    </div>
    <div class="prog-wrap" id="prog-wrap">
      <div class="prog-header"><span>Progreso hacia la meta</span><span id="prog-pct"></span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Distribución de gastos</div>
      <div style="position:relative;height:220px"><canvas id="pie-canvas"></canvas></div>
    </div>
    <div class="chart-title" style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Por categoría</div>
    <div class="cats-grid" id="cats-grid"></div>
  </div>

  <!-- HISTORIAL -->
  <div id="sec-historial" class="section">
    <div class="hist-form">
      <div class="field"><label>Mes</label><input type="text" id="h-mes" placeholder="Mayo"/></div>
      <div class="field"><label>Año</label><input type="number" id="h-anio" value="2026" style="width:72px"/></div>
      <div class="field"><label>Ingresos</label><input type="number" id="h-ing" placeholder="0"/></div>
      <div class="field"><label>Gastos</label><input type="number" id="h-gas" placeholder="0"/></div>
      <div class="field"><label>Suscripciones</label><input type="number" id="h-sus" placeholder="0"/></div>
      <button class="btn-hist" onclick="addHist()">+ Agregar mes</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Mes</th><th>Año</th><th>Ingresos</th><th>Gastos</th><th>Suscripciones</th><th>Saldo</th><th></th></tr></thead>
        <tbody id="h-tbody"></tbody>
      </table>
    </div>
    <div class="chart-wrap" style="margin-top:14px">
      <div class="chart-title">Evolución mensual</div>
      <div style="position:relative;height:200px"><canvas id="bar-canvas"></canvas></div>
    </div>
  </div>

</div><!-- /main -->

<!-- MODAL EDITAR -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>✏️ Editar registro</h3>
    <div class="field"><label>Descripción</label><input type="text" id="m-desc"/></div>
    <div class="field"><label>Monto (CLP)</label><input type="number" id="m-monto"/></div>
    <div class="field"><label>Categoría</label>
      <select id="m-cat">
        <option>Alimentación</option><option>Transporte</option><option>Entretenimiento</option>
        <option>Salud</option><option>Educación</option><option>Ropa</option><option>Hogar</option>
        <option>Ingresos</option><option>Otros</option>
      </select>
    </div>
    <div class="field"><label>Tipo</label>
      <select id="m-tipo">
        <option value="sueldo">💚 Sueldo</option>
        <option value="compra">🛒 Compra</option>
        <option value="transferencia">💛 Transferencia</option>
        <option value="pago">🔵 Pago cuenta</option>
        <option value="suscripcion">🔄 Suscripción</option>
      </select>
    </div>
    <div class="field"><label>Frecuencia</label>
      <select id="m-frec">
        <option value="unico">1️⃣ Pago único</option>
        <option value="mensual">📆 Pago mensual</option>
      </select>
    </div>
    <div class="field"><label>Fecha</label><input type="date" id="m-fecha"/></div>
    <div class="modal-btns">
      <button class="btn-save" onclick="saveEdit()">✔ Guardar</button>
      <button class="btn-cancel" onclick="closeModal()">✖ Cancelar</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let records = [], historial = [], tabFiltro = 'todos', editIdx = -1;
let pieChart = null, barChart = null;

// ── CONFIG GOOGLE SHEETS ──────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8HyiuyImNTxwESqM1ghLPwTYn4LVSnO96uLECnmrthDlkejU_U01wL7wl08IHcjnB/exec';

// ── PERSIST ───────────────────────────────────────────────────────────────
function setSyncStatus(msg, color) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = color || 'var(--text2)'; }
}

function save() {
  // Guardar local siempre (respaldo)
  try {
    localStorage.setItem('cfp_records', JSON.stringify(records));
    localStorage.setItem('cfp_historial', JSON.stringify(historial));
  } catch(e) {}
  // Sincronizar con Google Sheets
  syncToSheets();
}

function syncToSheets() {
  setSyncStatus('⟳ Guardando...', 'var(--amber)');
  // Enviar registros
  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ type: 'records', records: records }),
  })
  .then(r => r.json())
  .then(res => {
    if (!res.ok) throw new Error(res.error);
    // Enviar historial
    return fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ type: 'historial', historial: historial }),
    });
  })
  .then(r => r.json())
  .then(res => {
    if (!res.ok) throw new Error(res.error);
    setSyncStatus('✔ Guardado en Sheets', 'var(--green)');
    setTimeout(() => setSyncStatus(''), 3000);
  })
  .catch(err => {
    console.error('Sync error:', err);
    setSyncStatus('⚠ Solo local', 'var(--red)');
  });
}

function load() {
  // Intentar cargar desde Google Sheets primero
  setSyncStatus('⟳ Cargando...', 'var(--amber)');
  fetch(SCRIPT_URL)
    .then(r => r.json())
    .then(data => {
      if (data.records && data.records.length > 0) {
        records = data.records.map(r => ({
          ...r,
          tipo: r.tipo === 'ingreso' ? 'sueldo' : r.tipo,
          monto: parseFloat(r.monto) || 0
        }));
      }
      if (data.historial && data.historial.length > 0) {
        historial = data.historial.map(h => ({
          ...h,
          ing: parseFloat(h.ing) || 0,
          gas: parseFloat(h.gas) || 0,
          sus: parseFloat(h.sus) || 0,
          saldo: parseFloat(h.saldo) || 0,
        }));
      }
      // Guardar también en local como respaldo
      try {
        localStorage.setItem('cfp_records', JSON.stringify(records));
        localStorage.setItem('cfp_historial', JSON.stringify(historial));
      } catch(e) {}
      setSyncStatus('✔ Datos cargados', 'var(--green)');
      setTimeout(() => setSyncStatus(''), 3000);
      updateKPIs();
      renderTabla();
      renderResumen();
    })
    .catch(err => {
      // Si falla Sheets, cargar desde localStorage
      console.warn('Sheets no disponible, cargando local:', err);
      setSyncStatus('⚠ Sin conexión — datos locales', 'var(--amber)');
      try {
        const r = localStorage.getItem('cfp_records');
        const h = localStorage.getItem('cfp_historial');
        if (r) records = JSON.parse(r).map(rec => ({
          ...rec,
          tipo: rec.tipo === 'ingreso' ? 'sueldo' : rec.tipo
        }));
        if (h) historial = JSON.parse(h);
      } catch(e) {}
      updateKPIs();
      renderTabla();
      renderResumen();
    });
}

// ── UTILS ─────────────────────────────────────────────────────────────────
const fmt = n => '$' + Math.round(n).toLocaleString('es-CL');
const hoy = () => new Date().toLocaleDateString('es-CL', {day:'2-digit',month:'2-digit',year:'numeric'});
const toInput = str => { const p = str.split('/'); return p.length === 3 ? `${p[2]}-${p[1]}-${p[0]}` : ''; };
const fromInput = v => { if (!v) return hoy(); const [y,m,d] = v.split('-'); return `${d}/${m}/${y}`; };
const esGasto = t => ['compra','transferencia','pago'].includes(t);
const esIngreso = t => ['ingreso','sueldo'].includes(t);

// ── CATS ──────────────────────────────────────────────────────────────────
const CATS = {
  'Alimentación': ['alimentaci','comida','almuerzo','desayuno','cena','café','cafe','restaurant','supermercado','jumbo','lider','unimarc','tottus','rappi','pedidos','pizza','sushi','pan','churrasco','empanada','feria','fruta','pollo','carne','oasis','continental','jenny','melt','crignola','food','pepa','vane','manu','mari','dond','boti'],
  'Transporte':   ['transporte','metro','bip','bus','taxi','uber','cabify','didi','bencina','gasolina','tren','micro','colectivo','peaje','flixbus','astop'],
  'Entretenimiento': ['entretenim','cine','teatro','netflix','spotify','disney','hbo','prime','youtube','juego','bar','disco','concierto','show','evento','twitch','streaming'],
  'Salud':        ['salud','farmacia','médico','medico','hospital','clinica','dentista','remedios','medicamento','seguro','isapre','fonasa','copago'],
  'Educación':    ['educaci','colegio','universidad','curso','libro','estudio','capacit','udemy','platzi','matrícula'],
  'Ropa':         ['ropa','zapato','zapatilla','polera','pantalon','vestido','camisa','zara','ripley','falabella','paris'],
  'Hogar':        ['hogar','arriendo','agua','luz','gas','internet','electricidad','limpieza','sodimac','mantención','dividendo','movistar','cerro paraiso'],
};
const CAT_COLORS = {
  'Alimentación':'#2dd87a','Transporte':'#4a8ef5','Entretenimiento':'#e05c8a',
  'Salud':'#f04a5a','Educación':'#a78ef5','Ropa':'#f5a623','Hogar':'#5dcaa5',
  'Ingresos':'#2dd87a','Otros':'#555a6b'
};
function detectCat(text, tipo) {
  if (tipo === 'ingreso' || tipo === 'sueldo') return 'Ingresos';
  const t = text.toLowerCase();
  for (const [cat, kws] of Object.entries(CATS)) if (kws.some(k => t.includes(k))) return cat;
  if (tipo === 'pago') return 'Hogar';
  return 'Otros';
}

// ── BADGES ────────────────────────────────────────────────────────────────
const BADGE = {
  ingreso:       '<span class="badge b-ingreso">💚 Sueldo</span>',
  sueldo:        '<span class="badge b-ingreso">💚 Sueldo</span>',
  compra:        '<span class="badge b-compra">🛒 Compra</span>',
  transferencia: '<span class="badge b-transferencia">💛 Transf.</span>',
  pago:          '<span class="badge b-pago">🔵 Pago</span>',
  suscripcion:   '<span class="badge b-suscripcion">🔄 Suscr.</span>',
};
const MONTO_COLOR = {
  ingreso:'var(--green)', sueldo:'var(--green)', compra:'var(--red)',
  transferencia:'var(--yellow)', pago:'var(--blue)', suscripcion:'var(--amber)'
};
const frecBadge = f => f === 'mensual'
  ? '<span class="b-frec-mensual">📆 Mensual</span>'
  : '<span class="b-frec-unico">1️⃣ Único</span>';

// ── FORM COLORS ───────────────────────────────────────────────────────────
function colorTipo() {
  const s = document.getElementById('f-tipo');
  s.className = 'tipo-' + s.value;
  const esSuscripcion = s.value === 'suscripcion';
  document.getElementById('f-fecha').style.display = esSuscripcion ? 'none' : '';
  document.getElementById('f-dia').style.display   = esSuscripcion ? '' : 'none';
  document.getElementById('f-fecha-label').textContent = esSuscripcion ? '📅 Día de cobro' : '📅 Fecha';
  // Al volver a suscripcion, poner frecuencia mensual automáticamente
  if (esSuscripcion) {
    const frec = document.getElementById('f-frec');
    frec.value = 'mensual';
    colorFrec();
  }
}
function colorFrec() {
  const s = document.getElementById('f-frec');
  s.className = s.value === 'mensual' ? 'frec-mensual' : '';
}

// ── KPIs ──────────────────────────────────────────────────────────────────
function updateKPIs() {
  const ing = records.filter(r => esIngreso(r.tipo)).reduce((s,r) => s + r.monto, 0);
  const gas = records.filter(r => esGasto(r.tipo)).reduce((s,r) => s + r.monto, 0);
  const sus = records.filter(r => r.tipo === 'suscripcion').reduce((s,r) => s + r.monto, 0);
  document.getElementById('ki').textContent = fmt(ing);
  document.getElementById('kg').textContent = fmt(gas);
  document.getElementById('ks').textContent = fmt(sus);
  const sal = ing - gas - sus;
  const el = document.getElementById('kn');
  el.textContent = fmt(sal);
  el.className = 'kpi-val ' + (sal >= 0 ? 'blue' : 'red');
}

// ── TABLE ─────────────────────────────────────────────────────────────────
function renderTabla() {
  const tb = document.getElementById('tbody');
  const filtered = tabFiltro === 'todos' ? records : records.filter(r => r.tipo === tabFiltro);
  if (!filtered.length) {
    tb.innerHTML = '<tr><td colspan="7" class="empty">Sin registros aún — agrega tu primer movimiento arriba</td></tr>';
    return;
  }
  tb.innerHTML = filtered.map(r => {
    const idx = records.indexOf(r);
    const mc = MONTO_COLOR[r.tipo] || 'var(--text)';
    const prefix = esIngreso(r.tipo) ? '+' : '−';
    return `<tr>
      <td class="col-fecha">${r.fecha}</td>
      <td>${r.desc}</td>
      <td><span style="font-size:11px;color:var(--text2)">${r.cat}</span></td>
      <td class="col-monto" style="color:${mc}">${prefix}${fmt(r.monto)}</td>
      <td>${BADGE[r.tipo] || ''}</td>
      <td>${frecBadge(r.frec || 'unico')}</td>
      <td class="col-actions">
        <button class="btn-edit" onclick="openEdit(${idx})" title="Editar">✏️</button>
        <button class="btn-del" onclick="eliminar(${idx})" title="Eliminar">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

// ── AGREGAR ───────────────────────────────────────────────────────────────
function agregar() {
  const desc  = document.getElementById('f-desc').value.trim();
  const monto = parseFloat(document.getElementById('f-monto').value) || 0;
  if (!desc)  { alert('Escribe una descripción.'); return; }
  if (!monto) { alert('Ingresa un monto válido.'); return; }
  const tipo  = document.getElementById('f-tipo').value;
  const frec  = document.getElementById('f-frec').value;
  // Para suscripciones usar solo el día, completando con mes/año actual
  let fecha;
  if (tipo === 'suscripcion') {
    const dia = parseInt(document.getElementById('f-dia').value);
    if (!dia || dia < 1 || dia > 31) { alert('Ingresa un día válido (1-31).'); return; }
    const now = new Date();
    const mm  = String(now.getMonth() + 1).padStart(2, '0');
    const yy  = now.getFullYear();
    fecha = String(dia).padStart(2, '0') + '/' + mm + '/' + yy;
  } else {
    fecha = fromInput(document.getElementById('f-fecha').value);
  }
  const cat   = detectCat(desc, tipo);
  records.push({ tipo, frec, monto, cat, desc, fecha });
  save(); updateKPIs(); renderTabla(); renderResumen();
  document.getElementById('f-desc').value  = '';
  document.getElementById('f-monto').value = '';
}

// ── ELIMINAR ──────────────────────────────────────────────────────────────
function eliminar(i) {
  if (!confirm('¿Eliminar este registro?')) return;
  records.splice(i, 1);
  save(); updateKPIs(); renderTabla(); renderResumen();
}

// ── EDITAR ────────────────────────────────────────────────────────────────
function openEdit(i) {
  editIdx = i;
  const r = records[i];
  document.getElementById('m-desc').value  = r.desc || '';
  document.getElementById('m-monto').value = r.monto || 0;
  document.getElementById('m-cat').value   = r.cat || 'Otros';
  document.getElementById('m-tipo').value  = r.tipo || 'compra';
  document.getElementById('m-frec').value  = r.frec || 'unico';
  document.getElementById('m-fecha').value = toInput(r.fecha);
  document.getElementById('overlay').classList.add('on');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('on');
  editIdx = -1;
}
function saveEdit() {
  if (editIdx < 0) return;
  const fv = document.getElementById('m-fecha').value;
  let fd = hoy();
  if (fv) { const [y,m,d] = fv.split('-'); fd = `${d}/${m}/${y}`; }
  records[editIdx] = {
    desc:  document.getElementById('m-desc').value.trim() || records[editIdx].desc,
    monto: parseFloat(document.getElementById('m-monto').value) || 0,
    cat:   document.getElementById('m-cat').value,
    tipo:  document.getElementById('m-tipo').value,
    frec:  document.getElementById('m-frec').value,
    fecha: fd,
  };
  save(); updateKPIs(); renderTabla(); renderResumen(); closeModal();
}

// ── FILTRO ────────────────────────────────────────────────────────────────
function filtrar(tab, el) {
  tabFiltro = tab;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderTabla();
}

// ── MAIN TABS ─────────────────────────────────────────────────────────────
function mainTab(sec, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('sec-' + sec).classList.add('on');
  el.classList.add('on');
  if (sec === 'resumen')   renderResumen();
  if (sec === 'historial') renderHistorial();
}

// ── RESUMEN ───────────────────────────────────────────────────────────────
function renderResumen() {
  const gastos = records.filter(r => r.tipo !== 'ingreso');
  const catTotals = {};
  gastos.forEach(r => { catTotals[r.cat] = (catTotals[r.cat] || 0) + r.monto; });
  const total = Object.values(catTotals).reduce((s,v) => s + v, 0) || 1;
  const sorted = Object.entries(catTotals).sort((a,b) => b[1] - a[1]);

  // cats grid
  const grid = document.getElementById('cats-grid');
  grid.innerHTML = sorted.length ? sorted.map(([cat, val]) => {
    const pct = Math.round(val / total * 100);
    const col = CAT_COLORS[cat] || '#888';
    return `<div class="cat-card">
      <div class="cat-card-label"><span>${cat}</span><span style="color:${col}">${pct}%</span></div>
      <div class="cat-card-bar"><div class="cat-card-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="cat-card-val">${fmt(val)}</div>
    </div>`;
  }).join('') : '<p style="color:var(--text3);font-size:13px;padding:.5rem 0">Sin gastos registrados aún</p>';

  // meta
  const meta = parseFloat(document.getElementById('meta-inp').value) || 0;
  const ing  = records.filter(r => esIngreso(r.tipo)).reduce((s,r) => s + r.monto, 0);
  const gas  = records.filter(r => esGasto(r.tipo)).reduce((s,r) => s + r.monto, 0);
  const sus  = records.filter(r => r.tipo === 'suscripcion').reduce((s,r) => s + r.monto, 0);
  const saldo = ing - gas - sus;
  const pw = document.getElementById('prog-wrap');
  if (meta > 0) {
    const pct = Math.min(Math.round(saldo / meta * 100), 100);
    const ok  = saldo >= meta;
    pw.style.display = 'block';
    document.getElementById('prog-pct').textContent = pct + '% — ' + (ok ? '✔ Meta cumplida!' : 'Faltan ' + fmt(meta - saldo));
    document.getElementById('prog-fill').style.width      = Math.max(0, pct) + '%';
    document.getElementById('prog-fill').style.background = ok ? 'var(--green)' : 'var(--amber)';
    document.getElementById('meta-status').textContent    = 'Saldo actual: ' + fmt(saldo);
  } else {
    pw.style.display = 'none';
    document.getElementById('meta-status').textContent = '';
  }

  // pie chart
  if (pieChart) { pieChart.destroy(); pieChart = null; }
  if (sorted.length) {
    pieChart = new Chart(document.getElementById('pie-canvas'), {
      type: 'doughnut',
      data: {
        labels: sorted.map(([c]) => c),
        datasets: [{ data: sorted.map(([,v]) => v), backgroundColor: sorted.map(([c]) => CAT_COLORS[c] || '#888'), borderWidth: 0, hoverOffset: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'right', labels: { color: '#8b90a0', font: { family: 'DM Sans', size: 11 }, boxWidth: 10, padding: 12 } },
          tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.raw) + ' (' + Math.round(ctx.raw / total * 100) + '%)' } }
        }
      }
    });
  }
}

// ── HISTORIAL ─────────────────────────────────────────────────────────────
function addHist() {
  const mes = document.getElementById('h-mes').value.trim();
  if (!mes) return;
  const anio = parseInt(document.getElementById('h-anio').value) || 2026;
  const ing  = parseFloat(document.getElementById('h-ing').value) || 0;
  const gas  = parseFloat(document.getElementById('h-gas').value) || 0;
  const sus  = parseFloat(document.getElementById('h-sus').value) || 0;
  historial.push({ mes, anio, ing, gas, sus, saldo: ing - gas - sus });
  save(); renderHistorial();
  ['h-mes','h-ing','h-gas','h-sus'].forEach(id => { document.getElementById(id).value = ''; });
}
function delHist(i) { historial.splice(i, 1); save(); renderHistorial(); }
function renderHistorial() {
  const tb = document.getElementById('h-tbody');
  if (!historial.length) {
    tb.innerHTML = '<tr><td colspan="7" class="empty">Sin historial — agrega el resumen de cada mes</td></tr>';
  } else {
    tb.innerHTML = historial.map((h,i) => `<tr>
      <td>${h.mes}</td><td style="color:var(--text2)">${h.anio}</td>
      <td style="color:var(--green);font-family:'DM Mono',monospace">${fmt(h.ing)}</td>
      <td style="color:var(--red);font-family:'DM Mono',monospace">${fmt(h.gas)}</td>
      <td style="color:var(--amber);font-family:'DM Mono',monospace">${fmt(h.sus)}</td>
      <td style="font-weight:700;font-family:'DM Mono',monospace;color:${h.saldo>=0?'var(--green)':'var(--red)'}">${fmt(h.saldo)}</td>
      <td><button class="btn-del" onclick="delHist(${i})">🗑</button></td>
    </tr>`).join('');
  }
  if (barChart) { barChart.destroy(); barChart = null; }
  if (historial.length > 0) {
    barChart = new Chart(document.getElementById('bar-canvas'), {
      type: 'bar',
      data: {
        labels: historial.map(h => h.mes),
        datasets: [
          { label: 'Ingresos',      data: historial.map(h => h.ing),   backgroundColor: 'rgba(45,216,122,.7)' },
          { label: 'Gastos',        data: historial.map(h => h.gas),   backgroundColor: 'rgba(240,74,90,.7)' },
          { label: 'Saldo',         data: historial.map(h => h.saldo), backgroundColor: 'rgba(74,142,245,.7)' },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b90a0', font: { family: 'DM Sans', size: 11 }, padding: 14 } } },
        scales: {
          x: { ticks: { color: '#8b90a0', font: { family: 'DM Sans' } }, grid: { color: 'rgba(255,255,255,.04)' } },
          y: { ticks: { color: '#8b90a0', font: { family: 'DM Mono' }, callback: v => '$' + Math.round(v/1000) + 'k' }, grid: { color: 'rgba(255,255,255,.04)' } }
        }
      }
    });
  }
}

// ── EXPORTAR EXCEL ────────────────────────────────────────────────────────
function exportar() {
  if (!records.length) { alert('No hay registros para exportar.'); return; }
  const wb   = XLSX.utils.book_new();
  const ing  = records.filter(r => esIngreso(r.tipo)).reduce((s,r) => s + r.monto, 0);
  const gas  = records.filter(r => esGasto(r.tipo)).reduce((s,r) => s + r.monto, 0);
  const sus  = records.filter(r => r.tipo === 'suscripcion').reduce((s,r) => s + r.monto, 0);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    ['Resumen Financiero'], [],
    ['Ingresos (CLP)', ing], ['Gastos (CLP)', gas],
    ['Suscripciones (CLP)', sus], ['Saldo neto (CLP)', ing - gas - sus],
    [], ['Exportado', hoy()]
  ]), 'Resumen');
  const cols = ['Fecha','Descripción','Categoría','Monto (CLP)','Tipo','Frecuencia'];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([cols, ...records.map(r => [r.fecha, r.desc, r.cat, r.monto, r.tipo, r.frec || 'unico'])]), 'Todos');
  ['sueldo','compra','transferencia','pago','suscripcion'].forEach(t => {
    const rows = records.filter(r => r.tipo === t);
    if (rows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([cols, ...rows.map(r => [r.fecha, r.desc, r.cat, r.monto, r.tipo, r.frec || 'unico'])]), t.charAt(0).toUpperCase() + t.slice(1) + 's');
  });
  if (historial.length) {
    const hcols = ['Mes','Año','Ingresos','Gastos','Suscripciones','Saldo'];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([hcols, ...historial.map(h => [h.mes, h.anio, h.ing, h.gas, h.sus, h.saldo])]), 'Historial');
  }
  XLSX.writeFile(wb, 'finanzas_' + hoy().replace(/\//g, '-') + '.xlsx');
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('overlay').classList.contains('on')) { saveEdit(); return; }
    if (document.activeElement.id === 'f-desc') { document.getElementById('f-monto').focus(); return; }
    if (document.activeElement.id === 'f-monto') { agregar(); return; }
  }
  if (e.key === 'Escape') closeModal();
});

// ── LIMPIAR CACHE Y RECARGAR DESDE SHEETS ────────────────────────────────
function limpiarYRecargar() {
  if (!confirm('¿Limpiar caché local y recargar datos desde Google Sheets?')) return;
  localStorage.removeItem('cfp_records');
  localStorage.removeItem('cfp_historial');
  load();
}

// ── INIT ──────────────────────────────────────────────────────────────────
colorTipo();
colorFrec();
document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
load(); // carga desde Sheets (y llama updateKPIs + renderTabla internamente)
</script>
